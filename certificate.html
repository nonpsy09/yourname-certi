<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Prompt:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background: transparent; font-family: 'Prompt', sans-serif; }
        .cert-container { 
            position: relative; 
            width: 100%; 
            max-width: 600px; 
            aspect-ratio: 4 / 3; 
            background-size: cover; 
            background-position: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }
        
        /* ปรับแต่งชื่อผู้เล่นให้เป็น ฟอนต์ Itim ตัวบางสีดำ */
        .name-display { 
            position: absolute; 
            width: 100%; 
            text-align: center; 
            top: 44%; 
            left: 0; 
            font-family: 'Itim', cursive; 
            font-size: 30px;              
            font-weight: normal; 
            color: #1a1a1a;                
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1); 
        }
        
        .btn-zone { margin-top: 15px; display: flex; gap: 10px; }
        button { 
            font-family: 'Prompt', sans-serif;
            padding: 12px 25px; 
            background: #27ae60; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        button:hover { background: #219653; }
    </style>
</head>
<body>

    <div id="captureArea" class="cert-container">
        <div id="displayName" class="name-display">กำลังโหลด...</div>
    </div>
    
    <div class="btn-zone">
        <button onclick="downloadCertificate()">ดาวน์โหลดรูปภาพ</button>
    </div>

    <script>
        window.onload = function() {
            var savedName = localStorage.getItem('player_name_shared');
            document.getElementById('displayName').innerText = savedName ? savedName : "ผู้เข้าร่วมกิจกรรม";

            const urlParams = new URLSearchParams(window.location.search);
            const stage = urlParams.get('stage');
            
            var bgImage = 'bg1.png'; 
            if (stage === '1') bgImage = 'bg1.png';
            if (stage === '2') bgImage = 'bg2.png';
            if (stage === '3') bgImage = 'bg3.png';
            if (stage === '4') bgImage = 'bg4.png';
            if (stage === '5') bgImage = 'bg5.png';
            if (stage === '6') bgImage = 'bg6.png';

            document.getElementById('captureArea').style.backgroundImage = "url('" + window.location.origin + window.location.pathname.replace('certificate.html', '') + bgImage + "')";
        };

        function downloadCertificate() {
            var element = document.getElementById("captureArea");
            html2canvas(element, {
                useCORS: true,
                allowTaint: false,
                scale: 2
            }).then(function(canvas) {
                var imgData = canvas.toDataURL("image/png");
                var link = document.createElement('a');
                link.download = 'certificate_stage.png';
                link.href = imgData;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }).catch(function(error) {
                alert("ไม่สามารถบันทึกรูปภาพได้อัตโนมัติเนื่องจากระบบรักษาความปลอดภัย");
            });
        }
    </script>
</body>
</html>
