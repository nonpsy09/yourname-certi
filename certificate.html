<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Prompt:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background: transparent; font-family: 'Prompt', sans-serif; }
        .cert-container { 
            position: relative; 
            width: 100%; 
            max-width: 600px; 
            aspect-ratio: 4 / 3; 
            background-size: cover; 
            background-position: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }
        
        /* 2. ปรับแต่งชื่อผู้เล่นให้เป็น ฟอนต์ Itim ตัวสีแดง */
        .name-display { 
            position: absolute; 
            width: 100%; 
            text-align: center; 
            top: 46%; /* <--- ปรับเปอร์เซ็นต์ขยับขึ้น-ลง ให้ตรงช่องว่างของเกียรติบัตรคุณได้ตรงนี้ */
            left: 0; 
            font-family: 'Itim', cursive; /* ใช้ฟอนต์ไอติม */
            font-size: 36px;              /* ขนาดตัวอักษรของชื่อ */
            font-weight: bold; 
            color: #d32f2f;               /* โค้ดสีแดงสด */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1); /* ใส่เงาบางๆ ให้ชื่อดูมิติชัดขึ้น */
        }
        
        .btn-zone { margin-top: 15px; display: flex; gap: 10px; }
        button { 
            font-family: 'Prompt', sans-serif;
            padding: 12px 25px; 
            background: #27ae60; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
        }
        button.preview-btn { background: #2f80ed; }
        
        /* โซนแสดงรูปภาพสำหรับกดค้างเซฟบนมือถือ */
        #resultImageZone { display: none; margin-top: 15px; text-align: center; }
        #resultImageZone img { width: 100%; max-width: 600px; border: 2px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .hint { color: #555; font-size: 14px; margin-top: 5px; font-weight: bold; font-family: 'Prompt', sans-serif; }
    </style>
</head>
<body>

    <div id="captureArea" class="cert-container">
        <div id="displayName" class="name-display">กำลังโหลด...</div>
    </div>
    
    <div class="btn-zone" id="btnZone">
        <button onclick="downloadCertificate()">ดาวน์โหลดรูปภาพ</button>
        <button class="preview-btn" onclick="generateImageForMobile()">แสดงรูปสำหรับมือถือ</button>
    </div>

    <div id="resultImageZone">
        <p class="hint">👇 ใช้มือถือเปิด: ให้กดค้างที่รูปภาพด้านล่างนี้ แล้วเลือก "บันทึกรูปภาพ" (Save Image) ลงเครื่องได้เลยครับ</p>
        <div id="imageContainer"></div>
    </div>

    <script>
        window.onload = function() {
            var savedName = localStorage.getItem('player_name_shared');
            document.getElementById('displayName').innerText = savedName ? savedName : "ผู้เข้าร่วมกิจกรรม";

            const urlParams = new URLSearchParams(window.location.search);
            const stage = urlParams.get('stage');
            
            var bgImage = 'bg1.png'; 
            if (stage === '1') bgImage = 'bg1.png';
            if (stage === '2') bgImage = 'bg2.png';
            if (stage === '3') bgImage = 'bg3.png';
            if (stage === '4') bgImage = 'bg4.png';
            if (stage === '5') bgImage = 'bg5.png';
            if (stage === '6') bgImage = 'bg6.png';

            // ดึงรูปแบบระบุว่ามาจากโดเมนเดียวกันเพื่อเลี่ยงปัญหา CORS
            document.getElementById('captureArea').style.backgroundImage = "url('" + window.location.origin + window.location.pathname.replace('certificate.html', '') + bgImage + "')";
        };

        // ฟังก์ชันที่ 1: ดาวน์โหลดอัตโนมัติ (เหมาะสำหรับคอมพิวเตอร์)
        function downloadCertificate() {
            var element = document.getElementById("captureArea");
            html2canvas(element, {
                useCORS: true,
                allowTaint: false,
                scale: 2
            }).then(function(canvas) {
                var imgData = canvas.toDataURL("image/png");
                var link = document.createElement('a');
                link.download = 'certificate_stage.png';
                link.href = imgData;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }).catch(function(error) {
                alert("เกิดข้อผิดพลาดในการสร้างรูปภาพ กรุณาลองใช้ปุ่ม 'แสดงรูปสำหรับมือถือ' แทนนะครับ");
            });
        }

        // ฟังก์ชันที่ 2: แปลงเป็นรูปแปะบนจอ (ออกแบบมาแก้ปัญหาระบบบล็อกดาวน์โหลดบนมือถือและ iframe)
        function generateImageForMobile() {
            var element = document.getElementById("captureArea");
            html2canvas(element, {
                useCORS: true,
                allowTaint: false,
                scale: 2
            }).then(function(canvas) {
                var imgData = canvas.toDataURL("image/png");
                var imgElement = document.createElement("img");
                imgElement.src = imgData;
                
                var container = document.getElementById("imageContainer");
                container.innerHTML = ""; // ล้างรูปเก่า
                container.appendChild(imgElement);
                
                // ซ่อนโซนเก่า แสดงโซนรูปภาพใหม่แทน
                document.getElementById("captureArea").style.display = "none";
                document.getElementById("btnZone").style.display = "none";
                document.getElementById("resultImageZone").style.display = "block";
            });
        }
    </script>
</body>
</html>
